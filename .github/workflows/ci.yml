name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile crew.py demo/multi_role_demo.py crewai_agents/marketing_agent.py scripts/smoke_test.py

      - name: Smoke test
        env:
          OPENAI_API_KEY: sk-smoke-test-placeholder
          OPENAI_MODEL_NAME: gpt-4o-mini
        run: |
          python scripts/smoke_test.py
